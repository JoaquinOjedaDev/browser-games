<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Star Assault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const PLAYER_SPEED        = 210;
const BULLET_SPEED        = 520;
const ENEMY_BULLET_SPEED  = 190;
const SHOOT_COOLDOWN      = 230;   // ms
const INVINCIBLE_DUR      = 1500;  // ms
const LEVEL_COMPLETE_DUR  = 3200;  // ms

const LEVELS = [
  { quota: 10, spawnInterval: 2200, types: ['grunt']                              },
  { quota: 20, spawnInterval: 1700, types: ['grunt','flanker']                    },
  { quota: 32, spawnInterval: 1300, types: ['grunt','flanker','shooter']           },
  { quota: 48, spawnInterval: 1000, types: ['grunt','flanker','shooter','tank']    },
  { quota: 65, spawnInterval: 650,  types: ['grunt','flanker','shooter','tank']    },
];

const EDEFS = {
  grunt:   { r: 16, spd: 88,  hp: 1, col: '#e63946', score: 10, si: 0    },
  flanker: { r: 13, spd: 125, hp: 1, col: '#f4a261', score: 20, si: 0    },
  shooter: { r: 15, spd: 58,  hp: 2, col: '#9b5de5', score: 30, si: 2400 },
  tank:    { r: 26, spd: 40,  hp: 4, col: '#c1121f', score: 50, si: 0    },
};

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let state       = 'MENU';   // MENU | PLAYING | LEVEL_COMPLETE | GAME_OVER
let gameWon     = false;
let score       = 0;
let highScore   = parseInt(localStorage.getItem('starAssaultHS') || '0');
let level       = 0;
let kills       = 0;
let totalSpawn  = 0;
let spawnTimer  = 0;
let lcTimer     = 0;   // level-complete countdown
let gameTime    = 0;

let shakeTimer = 0, shakeAmt = 0;
let blinkTimer = 0, blinkOn = true;

const keys  = {};
const mouse = { x: W/2, y: H/2 };
let   mouseDown = false;

// ─── PLAYER ───────────────────────────────────────────────────────────────────
let P = {};
function resetPlayer() {
  P = {
    x: W/2, y: H/2,
    r: 14,
    angle: 0,
    hp: 3, maxHp: 3,
    shootCD: 0,
    inv: false, invT: 0,
    flash: 0,
    gox: 0, goy: 0,    // grid parallax offset
  };
}

// ─── ARRAYS ───────────────────────────────────────────────────────────────────
let bullets = [], eBullets = [], enemies = [], particles = [], floats = [], menuEnems = [];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function d2(a, b) { return (a.x-b.x)**2 + (a.y-b.y)**2; }
function norm(dx, dy) {
  const l = Math.hypot(dx, dy);
  return l ? { x: dx/l, y: dy/l } : { x:0, y:0 };
}
function edgePos() {
  switch (Math.random() * 4 | 0) {
    case 0: return { x: Math.random()*W, y: -22 };
    case 1: return { x: W+22,  y: Math.random()*H };
    case 2: return { x: Math.random()*W, y: H+22 };
    default:return { x: -22,  y: Math.random()*H };
  }
}
function explode(x, y, col, n=10, spd=100) {
  for (let i = 0; i < n; i++) {
    const a = Math.PI*2*(i/n) + Math.random()*0.6;
    const s = spd * (0.5 + Math.random());
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life:1, decay: 1.4+Math.random(), col, sz: 3+Math.random()*4 });
  }
}
function floatText(x, y, txt, col) {
  floats.push({ x, y, txt, col, life:1, vy:-55 });
}
function shake(amt, dur) { shakeAmt = amt; shakeTimer = dur; }

// ─── SPAWNING ─────────────────────────────────────────────────────────────────
function spawnEnemy(type) {
  const d = EDEFS[type], pos = edgePos();
  enemies.push({
    ...pos, type,
    r: d.r, spd: d.spd, hp: d.hp, maxHp: d.hp,
    col: d.col, score: d.score,
    si: d.si, st: d.si * Math.random(),
    angle: 0, hurtT: 0,
    orb: Math.random()*Math.PI*2,
  });
}
function doSpawn(dt) {
  const lv = LEVELS[level];
  spawnTimer -= dt * 1000;
  if (spawnTimer <= 0 && totalSpawn < lv.quota + 8) {
    spawnEnemy(lv.types[Math.random()*lv.types.length|0]);
    totalSpawn++;
    spawnTimer = lv.spawnInterval;
  }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt) {
  gameTime += dt;
  blinkTimer += dt;
  if (blinkTimer > 0.5) { blinkTimer = 0; blinkOn = !blinkOn; }

  if (state === 'MENU')          { updateMenuEnems(dt); return; }
  if (state === 'LEVEL_COMPLETE') {
    lcTimer -= dt*1000;
    if (lcTimer <= 0) {
      level++;
      if (level >= LEVELS.length) { gameWon = true; state = 'GAME_OVER'; }
      else startLevel();
    }
    updateParticles(dt);
    return;
  }
  if (state === 'GAME_OVER') { updateParticles(dt); return; }

  // PLAYING
  updatePlayer(dt);
  updateBullets(dt);
  updateEBullets(dt);
  updateEnemies(dt);
  updateParticles(dt);
  updateFloats(dt);
  doSpawn(dt);
  checkLevel();
  if (shakeTimer > 0) shakeTimer -= dt;
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp']    || keys['w']) dy -= 1;
  if (keys['ArrowDown']  || keys['s']) dy += 1;
  const mv = norm(dx, dy);
  P.x = Math.max(P.r, Math.min(W-P.r, P.x + mv.x * PLAYER_SPEED * dt));
  P.y = Math.max(P.r, Math.min(H-P.r, P.y + mv.y * PLAYER_SPEED * dt));
  P.gox -= mv.x * PLAYER_SPEED * dt * 0.3;
  P.goy -= mv.y * PLAYER_SPEED * dt * 0.3;
  P.angle = Math.atan2(mouse.y - P.y, mouse.x - P.x);
  if (P.shootCD > 0) P.shootCD -= dt*1000;
  if (P.flash   > 0) P.flash   -= dt*1000;
  if (P.inv) { P.invT -= dt*1000; if (P.invT <= 0) P.inv = false; }
}

function shoot() {
  if (P.shootCD > 0 || state !== 'PLAYING') return;
  const gx = P.x + Math.cos(P.angle)*22;
  const gy = P.y + Math.sin(P.angle)*22;
  bullets.push({ x: gx, y: gy,
    vx: Math.cos(P.angle)*BULLET_SPEED,
    vy: Math.sin(P.angle)*BULLET_SPEED, r: 5 });
  P.shootCD = SHOOT_COOLDOWN;
  P.flash   = 85;
}

function updateBullets(dt) {
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx*dt; b.y += b.vy*dt;
    if (b.x < -30 || b.x > W+30 || b.y < -30 || b.y > H+30) { bullets.splice(i,1); continue; }
    let hit = false;
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (d2(b,e) < (b.r+e.r)**2) {
        e.hp--; e.hurtT = 110;
        bullets.splice(i,1); hit = true;
        if (e.hp <= 0) {
          explode(e.x, e.y, e.col, 10, 110);
          floatText(e.x, e.y - e.r - 8, '+'+e.score, '#fff');
          shake(3, 0.15);
          score += e.score;
          kills++;
          enemies.splice(j,1);
          if (score > highScore) { highScore = score; localStorage.setItem('starAssaultHS', highScore); }
        }
        break;
      }
    }
  }
}

function updateEBullets(dt) {
  for (let i = eBullets.length-1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx*dt; b.y += b.vy*dt;
    if (b.x < -30 || b.x > W+30 || b.y < -30 || b.y > H+30) { eBullets.splice(i,1); continue; }
    if (!P.inv && d2(b,P) < (b.r+P.r)**2) { eBullets.splice(i,1); hurtPlayer(); }
  }
}

function hurtPlayer() {
  if (P.inv) return;
  P.hp--;
  P.inv = true; P.invT = INVINCIBLE_DUR;
  shake(5, 0.3);
  explode(P.x, P.y, '#4cc9f0', 7, 65);
  if (P.hp <= 0) {
    explode(P.x, P.y, '#4cc9f0', 18, 160);
    shake(12, 0.55);
    if (score > highScore) { highScore = score; localStorage.setItem('starAssaultHS', highScore); }
    state = 'GAME_OVER';
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hurtT > 0) e.hurtT -= dt*1000;

    const dx = P.x - e.x, dy = P.y - e.y;
    const dist = Math.hypot(dx, dy);

    if (e.type === 'grunt') {
      if (dist > 0) { e.x += dx/dist*e.spd*dt; e.y += dy/dist*e.spd*dt; }
      e.angle = Math.atan2(dy, dx);

    } else if (e.type === 'flanker') {
      e.orb += dt * 1.8;
      const ta = Math.atan2(dy, dx) + Math.sin(e.orb) * 0.9;
      e.x += Math.cos(ta)*e.spd*dt;
      e.y += Math.sin(ta)*e.spd*dt;
      e.angle = ta;

    } else if (e.type === 'shooter') {
      const tgt = 195;
      if (dist > tgt+25) {
        e.x += dx/dist*e.spd*dt; e.y += dy/dist*e.spd*dt;
      } else if (dist < tgt-25) {
        e.x -= dx/dist*e.spd*dt; e.y -= dy/dist*e.spd*dt;
      } else {
        e.x += (-dy/dist)*e.spd*dt; e.y += (dx/dist)*e.spd*dt;
      }
      e.angle = Math.atan2(dy, dx);
      e.st -= dt*1000;
      if (e.st <= 0 && dist > 0) {
        const a = Math.atan2(dy, dx);
        eBullets.push({ x: e.x+Math.cos(a)*(e.r+6), y: e.y+Math.sin(a)*(e.r+6),
          vx: Math.cos(a)*ENEMY_BULLET_SPEED, vy: Math.sin(a)*ENEMY_BULLET_SPEED, r:5 });
        e.st = e.si;
      }

    } else if (e.type === 'tank') {
      if (dist > 0) { e.x += dx/dist*e.spd*dt; e.y += dy/dist*e.spd*dt; }
      e.angle = Math.atan2(dy, dx);
    }

    if (!P.inv && d2(e, P) < (e.r+P.r)**2) hurtPlayer();
  }
}

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vx *= 0.93; p.vy *= 0.93;
    p.life -= p.decay*dt;
    if (p.life <= 0) particles.splice(i,1);
  }
}
function updateFloats(dt) {
  for (let i = floats.length-1; i >= 0; i--) {
    const f = floats[i];
    f.y += f.vy*dt; f.life -= 1.6*dt;
    if (f.life <= 0) floats.splice(i,1);
  }
}

// Demo enemies for menu
function initMenuEnems() {
  menuEnems = [];
  const types = ['grunt','flanker','shooter','tank'];
  for (let i = 0; i < 8; i++) {
    const t = types[i % types.length];
    menuEnems.push({
      x: Math.random()*W, y: Math.random()*H,
      type: t, r: EDEFS[t].r, col: EDEFS[t].col,
      vx: (Math.random()-0.5)*40, vy: (Math.random()-0.5)*40,
      angle: Math.random()*Math.PI*2,
    });
  }
}
function updateMenuEnems(dt) {
  for (const e of menuEnems) {
    e.x = (e.x + e.vx*dt + W) % W;
    e.y = (e.y + e.vy*dt + H) % H;
    e.angle += dt * 0.5;
  }
}

function checkLevel() {
  if (kills >= LEVELS[level].quota) {
    enemies = []; eBullets = []; bullets = [];
    lcTimer = LEVEL_COMPLETE_DUR;
    state = 'LEVEL_COMPLETE';
  }
}

function startLevel() {
  kills = 0; totalSpawn = 0;
  spawnTimer = 600;
  enemies = []; eBullets = []; bullets = [];
  state = 'PLAYING';
}
function startGame() {
  score = 0; level = 0; gameWon = false;
  resetPlayer();
  bullets = []; eBullets = []; enemies = []; particles = []; floats = [];
  startLevel();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if (shakeTimer > 0) ctx.translate((Math.random()-.5)*shakeAmt*2, (Math.random()-.5)*shakeAmt*2);

  if (state === 'MENU') {
    renderBG(0, 0);
    renderMenuEnems();
    renderMenu();
  } else {
    renderBG(P.gox, P.goy);
    renderEBullets();
    renderBullets();
    renderEnemies();
    renderPlayer();
    renderParticles();
    renderFloats();
    renderHUD();
    if (state === 'LEVEL_COMPLETE') renderLC();
    if (state === 'GAME_OVER')      renderGO();
  }
  ctx.restore();
}

function renderBG(ox, oy) {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0,0,W,H);
  const gs = 60;
  const offX = ((ox % gs) + gs) % gs;
  const offY = ((oy % gs) + gs) % gs;
  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  ctx.lineWidth = 1;
  for (let x = -gs+offX; x < W+gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = -gs+offY; y < H+gs; y += gs) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

function drawEnemyShape(e, alpha) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(e.angle);
  const hurt = 'hurtT' in e && e.hurtT > 0;
  if (hurt) { ctx.globalAlpha = alpha * (0.5 + 0.5*(e.hurtT/110)); ctx.shadowColor = '#fff'; ctx.shadowBlur = 18; }
  else       { ctx.globalAlpha = alpha; ctx.shadowColor = e.col; ctx.shadowBlur = 9; }
  const fc = hurt ? '#fff' : e.col;

  if (e.type === 'grunt') {
    ctx.fillStyle = fc;
    ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
    if (!hurt) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(5,-5,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, 5,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(6,-5,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, 5,1.5,0,Math.PI*2); ctx.fill();
    }

  } else if (e.type === 'flanker') {
    ctx.fillStyle = fc;
    ctx.beginPath();
    ctx.moveTo(e.r,0); ctx.lineTo(0,-e.r); ctx.lineTo(-e.r,0); ctx.lineTo(0,e.r);
    ctx.closePath(); ctx.fill();
    if (!hurt) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    }

  } else if (e.type === 'shooter') {
    ctx.fillStyle = fc;
    ctx.fillRect(-e.r, -e.r, e.r*2, e.r*2);
    if (!hurt) {
      ctx.fillStyle = '#d4a6ff';
      ctx.fillRect(e.r-2, -3, 11, 6);
    }
    // hp bar
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#333'; ctx.fillRect(-e.r, -e.r-8, e.r*2, 5);
    ctx.fillStyle = e.col;  ctx.fillRect(-e.r, -e.r-8, e.r*2*(e.hp/e.maxHp), 5);

  } else if (e.type === 'tank') {
    ctx.fillStyle = fc;
    ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
    if (!hurt) {
      ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#333'; ctx.fillRect(-e.r, -e.r-10, e.r*2, 5);
    ctx.fillStyle = '#ff6b6b'; ctx.fillRect(-e.r, -e.r-10, e.r*2*(e.hp/e.maxHp), 5);
  }

  ctx.restore();
}

function renderPlayer() {
  if (P.hp <= 0) return;
  if (P.inv && Math.floor(P.invT / 90) % 2 === 0) return;
  ctx.save();
  ctx.translate(P.x, P.y);
  ctx.rotate(P.angle);
  const pulse = 0.55 + 0.45*Math.sin(gameTime*3.2);
  ctx.shadowColor = '#4cc9f0';
  ctx.shadowBlur  = 10 + pulse*8;
  // body
  ctx.fillStyle = '#dff3ff';
  ctx.beginPath(); ctx.arc(0,0,P.r,0,Math.PI*2); ctx.fill();
  // cockpit
  ctx.fillStyle = '#4cc9f0';
  ctx.beginPath(); ctx.arc(4,0,6,0,Math.PI*2); ctx.fill();
  // barrel
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#90e0ef';
  ctx.fillRect(P.r-2, -3, 14, 6);
  // muzzle flash
  if (P.flash > 0) {
    const t = P.flash/85;
    ctx.shadowColor = '#ffe066'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#ffe066';
    ctx.beginPath(); ctx.arc(P.r+12, 0, 6*t, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(P.r+12, 0, 3*t, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function renderEnemies() { for (const e of enemies) drawEnemyShape(e, 1); }
function renderMenuEnems() { for (const e of menuEnems) drawEnemyShape(e, 0.35); }

function renderBullets() {
  ctx.save();
  ctx.shadowColor = '#ffe066'; ctx.shadowBlur = 14;
  ctx.fillStyle = '#fff8d0';
  for (const b of bullets) { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}
function renderEBullets() {
  ctx.save();
  ctx.shadowColor = '#c77dff'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#ddb4fe';
  for (const b of eBullets) { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function renderParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
function renderFloats() {
  for (const f of floats) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.font = 'bold 15px monospace';
    ctx.fillStyle = f.col;
    ctx.textAlign = 'center';
    ctx.fillText(f.txt, f.x, f.y);
    ctx.restore();
  }
}

function heart(x, y, col) {
  ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = col; ctx.fillText('♥', x, y);
  ctx.textBaseline = 'alphabetic';
}

function renderHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, 38);
  // hearts
  for (let i = 0; i < P.maxHp; i++) heart(22 + i*28, 19, i < P.hp ? '#e63946' : '#333');
  // progress bar
  const quota = LEVELS[level].quota;
  const prog  = Math.min(kills/quota, 1);
  const bw = 200, bh = 14, bx = W/2-100, by = 12;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(bx, by, bw, bh);
  const barCol = level === LEVELS.length-1 ? '#ff6b6b' : '#4cc9f0';
  ctx.fillStyle = barCol;   ctx.fillRect(bx, by, bw*prog, bh);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  const lbl = level === LEVELS.length-1 ? `FINAL WAVE  ${kills}/${quota}` : `LEVEL ${level+1}  ${kills}/${quota}`;
  ctx.fillText(lbl, W/2, by+bh-1);
  // score
  ctx.textAlign = 'right';
  ctx.font = 'bold 17px monospace'; ctx.fillStyle = '#ffe066';
  ctx.fillText(score, W-12, 24);
}

function renderMenu() {
  // title
  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = '#e94560'; ctx.shadowBlur = 35;
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 76px monospace';
  ctx.fillText('STAR', W/2, H/2 - 55);
  ctx.fillStyle = '#4cc9f0'; ctx.shadowColor = '#4cc9f0';
  ctx.fillText('ASSAULT', W/2, H/2 + 15);
  ctx.restore();

  ctx.fillStyle = '#ffe066'; ctx.font = 'bold 19px monospace'; ctx.textAlign = 'center';
  ctx.fillText('HI-SCORE: ' + highScore, W/2, H/2 + 62);

  if (blinkOn) {
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 17px monospace';
    ctx.fillText('PRESS ENTER OR CLICK TO START', W/2, H/2 + 102);
  }
  ctx.fillStyle = '#3d3d5c'; ctx.font = '13px monospace';
  ctx.fillText('WASD / ARROWS  •  MOUSE to aim  •  CLICK to shoot', W/2, H-26);

  // enemy legend
  const types = ['grunt','flanker','shooter','tank'];
  const labels = ['GRUNT +10','FLANKER +20','SHOOTER +30','TANK +50'];
  const colW = W / (types.length + 1);
  for (let i = 0; i < types.length; i++) {
    const ex = colW * (i+1), ey = H - 70;
    const def = EDEFS[types[i]];
    drawEnemyShape({ x: ex, y: ey, type: types[i], r: def.r, col: def.col,
      angle: gameTime*0.5, hp: def.hp, maxHp: def.hp, hurtT: 0, si: 0, st: 0, orb: 0 }, 0.9);
    ctx.fillStyle = '#666'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(labels[i], ex, ey + def.r + 14);
  }
}

function renderLC() {
  ctx.fillStyle = 'rgba(0,0,0,0.62)'; ctx.fillRect(0,0,W,H);
  const p = 1 - lcTimer/LEVEL_COMPLETE_DUR;
  const s = 0.5 + 0.5 * Math.min(p*3, 1);
  ctx.save();
  ctx.translate(W/2, H/2); ctx.scale(s, s);
  ctx.shadowColor = '#4cc9f0'; ctx.shadowBlur = 22;
  ctx.fillStyle = '#4cc9f0'; ctx.font = 'bold 54px monospace'; ctx.textAlign = 'center';
  ctx.fillText('LEVEL', 0, -18);
  ctx.fillText('CLEAR!', 0, 44);
  if (level + 1 < LEVELS.length) {
    ctx.fillStyle = '#ffe066'; ctx.shadowColor = '#ffe066'; ctx.font = 'bold 22px monospace';
    const nxt = level + 1 === LEVELS.length - 1 ? 'FINAL WAVE INCOMING...' : `LEVEL ${level+2} INCOMING...`;
    ctx.fillText(nxt, 0, 92);
  }
  ctx.restore();
}

function renderGO() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.textAlign = 'center';
  const c = gameWon ? '#ffe066' : '#e94560';
  ctx.shadowColor = c; ctx.shadowBlur = 28;
  ctx.fillStyle = c; ctx.font = 'bold 58px monospace';
  ctx.fillText(gameWon ? 'YOU WIN!' : 'GAME OVER', W/2, H/2 - 65);
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 26px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, W/2, H/2);
  ctx.fillStyle = '#ffe066'; ctx.font = 'bold 19px monospace';
  ctx.fillText('HI-SCORE: ' + highScore, W/2, H/2 + 38);
  if (blinkOn) {
    ctx.fillStyle = '#888'; ctx.font = 'bold 17px monospace';
    ctx.fillText('PRESS ENTER OR CLICK TO RESTART', W/2, H/2 + 90);
  }
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
});
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  mouseDown = true;
  if (state === 'MENU' || state === 'GAME_OVER') startGame();
});
canvas.addEventListener('mouseup',   () => mouseDown = false);
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter') {
    if (state === 'MENU' || state === 'GAME_OVER') startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── LOOP ─────────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  if (mouseDown && state === 'PLAYING') shoot();
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initMenuEnems();
requestAnimationFrame(loop);
</script>
</body>
</html>
